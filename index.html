<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 웹 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        button { display: block; width: 100%; margin: 10px 0; padding: 15px; border: none; background-color: #007bff; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { font-weight: bold; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h2 id="question">HTML의 약자는 무엇일까요?</h2>
        <div id="options">
            <button onclick="checkAnswer(false)">Hyper Text Makeup Language</button>
            <button onclick="checkAnswer(true)">Hyper Text Markup Language</button>
            <button onclick="checkAnswer(false)">Home Tool Markup Language</button>
        </div>
        <p id="result"></p>
    </div>

    <script>
        function checkAnswer(isCorrect) {
            const resultText = document.getElementById("result");
            if (isCorrect) {
                resultText.textContent = "정답입니다! 🎉";
                resultText.style.color = "green";
            } else {
                resultText.textContent = "틀렸습니다. 다시 시도해보세요! 😢";
                resultText.style.color = "red";
            }
        }
    </script>

</body>
</html>
